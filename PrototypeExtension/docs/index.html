<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Assistant — Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>🎓 Campus Assistant</h1>
        <p class="app__subtitle">
          Ask about campus locations, deadlines, and how-to questions.
        </p>
        <p class="app__badge">
          prototype · answers are hardcoded, not real AI
        </p>
      </header>

      <section id="chat" class="chat" aria-live="polite"></section>
      <section class="history" aria-label="Previous questions">
        <div class="history__header">
          <span>Previous Questions</span>
          <button id="clearHistory" class="history__clear" type="button">
            Clear
          </button>
        </div>
        <div id="historyList" class="history__list">
          <p class="history__empty">No questions yet.</p>
        </div>
      </section>

      <div id="chips" class="chips" role="group" aria-label="Suggested questions">
        <span class="chips__label">Try asking:</span>
        <button class="chip" type="button">
          Where is the tutoring center?
        </button>
        <button class="chip" type="button">When is tuition due?</button>
        <button class="chip" type="button">How do I get my student ID?</button>
        <button class="chip" type="button">
          When is the last day to drop a class?
        </button>
        <button class="chip" type="button">
          Where is the financial aid office?
        </button>
        <button class="chip" type="button">How do I declare a major?</button>
      </div>

      <form id="composer" class="composer">
        <input
          id="input"
          class="composer__input"
          type="text"
          placeholder="Type your question…"
          autocomplete="off"
          aria-label="Type your question"
        />
        <button class="composer__send" type="submit">Send</button>
      </form>
    </main>

    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>
